<div class="user-mgmt page-section">
  <header class="user-mgmt__header">
    <h2 class="page-title">User Management</h2>
  </header>

  <div class="user-mgmt__toolbar-bar">
    <div class="user-mgmt__filters">
      <div class="user-mgmt__search-wrap">
        <span class="user-mgmt__search-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </span>
        <input type="search" pInputText placeholder="Search by name or email..." class="user-mgmt__search"
          [value]="searchQuery()" (input)="searchQuery.set($any($event.target).value)" />
      </div>
      <div class="user-mgmt__role-wrap">
        <label class="user-mgmt__role-label" for="role-filter">Role</label>
        <select id="role-filter" class="user-mgmt__role-select input" [value]="roleFilter()"
          (change)="roleFilter.set($any($event.target).value)">
          <option value="">All</option>
          <option value="Admin">Admin</option>
          <option value="Librarian">Librarian</option>
          <option value="Student">Student</option>
          <option value="Teacher">Teacher</option>
        </select>
      </div>
    </div>
    <div class="user-mgmt__action">
      <p-button (onClick)="openAdd()" icon="pi pi-plus" label="Add user"></p-button>
    </div>
  </div>

  <p-dialog [visible]="showForm()" (visibleChange)="showForm.set($event)" [modal]="true"
    [header]="editingId() ? 'Edit user' : 'Add new user'" [style]="{ width: '40rem', maxWidth: '95vw' }">
    <form [formGroup]="form" (ngSubmit)="save()" class="user-mgmt__modal-form flex flex-col mt-4">
      <div class="form-grid flex-1 overflow-y-auto px-1">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input pInputText formControlName="Fname" class="w-full" />
        </div>
        <div class="form-group">
          <label class="form-label">Middle initial</label>
          <input pInputText formControlName="Minitial" class="w-full" />
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input pInputText formControlName="Lname" class="w-full" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input pInputText type="email" formControlName="email" class="w-full" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input pInputText formControlName="phone" class="w-full" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <p-select formControlName="status" [options]="statusOptions" optionValue="value" optionLabel="label"
            styleClass="w-full"></p-select>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label class="form-label">Role</label>
          <p-select formControlName="role" [options]="roleOptions" optionValue="value" optionLabel="label"
            styleClass="w-full" [appendTo]="'body'"></p-select>
        </div>
      </div>
      <div class="user-mgmt__modal-footer mt-4">
        <p-button label="Cancel" severity="secondary" (onClick)="cancelForm()"></p-button>
        <p-button label="Save" type="submit"></p-button>
      </div>
    </form>
  </p-dialog>

  <section class="user-mgmt__table-section card-lg mt-6">
    <div class="user-mgmt__table-meta">
      <span class="user-mgmt__count">{{ filteredUsers().length }} user{{ filteredUsers().length === 1 ? '' : 's'
        }}</span>
    </div>
    <div class="table-wrap">
      <p-table [value]="filteredUsers()" styleClass="p-datatable-striped">
        <ng-template pTemplate="header">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-u>
          <tr>
            <td class="text-primary">{{ u.Fname }} {{ u.Minitial }} {{ u.Lname }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.phone || '—' }}</td>
            <td>{{ u.role }}</td>
            <td>{{ u.status }}</td>
            <td>
              <div class="flex gap-2">
                <p-button (onClick)="openEdit(u)" label="Edit" [text]="true" size="small"></p-button>
                <p-button (onClick)="delete(u.userid)" label="Delete" [text]="true" severity="danger"
                  size="small"></p-button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6" class="empty-cell">No users.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </section>
</div>
