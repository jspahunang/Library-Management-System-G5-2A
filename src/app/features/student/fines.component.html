<div class="page-section">
  <h2 class="page-title">Fines</h2>

  <div class="card">
    <p class="stat-label">Total unpaid</p>
    <p class="stat-value">₱{{ totalUnpaid() }}</p>
  </div>

  <div class="card-lg">
    <div class="table-wrap">
      <p-table [value]="fines()" styleClass="p-datatable-sm p-datatable-striped">
        <ng-template pTemplate="header">
          <tr>
            <th>Borrow ID</th>
            <th>Amount</th>
            <th>Days overdue</th>
            <th>Payment status</th>
            <th>Payment date</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-f>
          <tr>
            <td class="text-primary">{{ f.borrowid }}</td>
            <td>₱{{ f.fineamount }}</td>
            <td>{{ f.daysOverdue }}</td>
            <td>
              <app-status-badge [status]="f.paymentstatus" type="payment" />
            </td>
            <td>{{ f.paymentdate ?? '—' }}</td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5" class="empty-cell text-center p-4 text-gray-500">No fines.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
