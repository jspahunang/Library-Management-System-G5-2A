<div class="reset-page">
  <div class="login-card">
    <div class="login-box">
      <div class="login-heading">
        <h1 class="login-title">Reset password</h1>
        <p class="login-subtitle">Enter your account email and we'll reset your password.</p>
      </div>

      @if (message) {
      <p-message [severity]="success ? 'success' : 'error'" [text]="message"
        styleClass="w-full mb-4 align-left block" />
      }

      @if (!success) {
      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="reset-email" class="form-label">Email</label>
          <input id="reset-email" type="email" pInputText [(ngModel)]="email" name="email" class="w-full"
            placeholder="you@example.com" />
        </div>
        <p-button type="submit" [disabled]="loading" [label]="loading ? 'Resetting...' : 'Reset password'"
          styleClass="w-full" [style]="{'padding': '0.625rem'}"></p-button>
      </form>
      } @else {
      <div class="reset-actions flex flex-col gap-2">
        <p-button routerLink="/login" label="Back to sign in" styleClass="w-full"></p-button>
        <p-button type="button" (onClick)="resetForm()" label="Reset another account" severity="secondary"
          styleClass="w-full"></p-button>
      </div>
      }

      <p class="reset-footer">
        <a routerLink="/login" class="auth-nav-link">
          <span class="auth-nav-link-arrow" aria-hidden="true">←</span>
          Back to sign in
        </a>
      </p>
    </div>
  </div>
</div>
