<div class="book-mgmt page-section">
  <header class="book-mgmt__header">
    <h2 class="page-title">Book Management</h2>
  </header>

  <div class="book-mgmt__toolbar-bar">
    <div class="book-mgmt__filters">
      <div class="book-mgmt__search-wrap">
        <span class="book-mgmt__search-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </span>
        <input type="search" pInputText placeholder="Search by title, author, or ISBN..." class="book-mgmt__search"
          [ngModel]="searchQuery()" (ngModelChange)="onSearch($event)" name="bookSearch" />
      </div>
    </div>
    <div class="book-mgmt__action">
      <p-button (onClick)="openAdd()" icon="pi pi-plus" label="Add book"></p-button>
    </div>
  </div>

  <p-dialog [visible]="showForm()" (visibleChange)="showForm.set($event)" [modal]="true"
    [header]="editingId() ? 'Edit book' : 'Add new book'" [style]="{ width: '25rem' }">
    <form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4 mt-2">
      <div class="flex flex-col gap-2">
        <label class="font-semibold">Title</label>
        <input pInputText formControlName="booktitle" class="w-full" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="font-semibold">Author</label>
        <input pInputText formControlName="author" class="w-full" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="font-semibold">ISBN</label>
        <input pInputText formControlName="isbn" class="w-full" [readonly]="!!editingId()" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="font-semibold">Category</label>
        <input pInputText formControlName="category" class="w-full" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="font-semibold">Total copies</label>
        <input type="number" pInputText formControlName="totalCopies" class="w-full" min="1" />
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <p-button label="Cancel" severity="secondary" (onClick)="cancelForm()"></p-button>
        <p-button label="Save" type="submit"></p-button>
      </div>
    </form>
  </p-dialog>

  <section class="book-mgmt__table-section card-lg mt-6">
    <div class="book-mgmt__table-meta">
      <span class="book-mgmt__count">{{ filteredBooks().length }} book{{ filteredBooks().length === 1 ? '' : 's'
        }}</span>
    </div>
    <div class="table-wrap">
      <p-table [value]="filteredBooks()" styleClass="p-datatable-striped">
        <ng-template pTemplate="header">
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Category</th>
            <th>Available / Total</th>
            <th>Actions</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-b>
          <tr>
            <td class="text-primary">{{ b.booktitle }}</td>
            <td>{{ b.author }}</td>
            <td>{{ b.isbn }}</td>
            <td>{{ b.category }}</td>
            <td>{{ b.availableCopies }} / {{ b.totalCopies }}</td>
            <td>
              <div class="flex gap-2">
                <p-button (onClick)="openEdit(b)" label="Edit" [text]="true" size="small"></p-button>
                <p-button (onClick)="delete(b.bookid)" label="Delete" [text]="true" severity="danger"
                  size="small"></p-button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6" class="empty-cell">No books.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </section>
</div>
