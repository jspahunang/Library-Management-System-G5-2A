<div class="dashboard-wrap">
  <aside class="sidebar" [class.sidebar-open]="sidebarOpen()" [class.sidebar-collapsed]="!sidebarOpen()">
    <div class="sidebar-header" [class.sidebar-open]="sidebarOpen()" [class.sidebar-collapsed]="!sidebarOpen()">
      @if (sidebarOpen()) {
      <span class="sidebar-welcome">Welcome, {{ session()?.fullName ?? 'Guest' }}</span>
      }
      <p-button [icon]="sidebarOpen() ? 'pi pi-chevron-left' : 'pi pi-chevron-right'" (onClick)="toggleSidebar()"
        [text]="true" severity="secondary" [rounded]="true" aria-label="Toggle sidebar"></p-button>
    </div>
    <nav class="sidebar-nav">
      @for (item of navItems(); track item.route) {
      <a [routerLink]="item.route" [title]="!sidebarOpen() ? item.label : null" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <span class="nav-icon" [innerHTML]="safeIcon(item.icon)"></span>
        @if (sidebarOpen()) {
        <span>{{ item.label }}</span>
        }
      </a>
      }
    </nav>
  </aside>

  <div class="main-area">
    <header class="header">
      <h1 class="header-title">Library Management System</h1>
      <div class="header-actions">
        <p-button [icon]="theme.isDark() ? 'pi pi-sun' : 'pi pi-moon'" (onClick)="theme.toggle()" [text]="true"
          severity="secondary" [rounded]="true"
          [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        </p-button>
        <span class="header-user">{{ session()?.fullName }} ({{ session()?.role }})</span>
        <p-button (onClick)="logout()" label="Logout" [text]="true" severity="danger"></p-button>
      </div>
    </header>

    <main class="main-content">
      <p-toast />
      <router-outlet />
    </main>
  </div>
</div>
